apiVersion: apps/v1
kind: Deployment
metadata:
  name: chronos-gateway
  namespace: chronos
  labels:
    app.kubernetes.io/name: chronos-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chronos-gateway
  strategy:
    # Gateway outputs feed node-local refclock inputs; avoid two writers racing
    # on the same node during a rollout.
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chronos-gateway
    spec:
      # ntpd/ntpsec overlays share the node's IPC namespace so the gateway can
      # publish into the daemon's SysV SHM refclock segment.
      hostIPC: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: chronos-gateway
          image: ghcr.io/maple52046/chronos:1.0.0-20260621100731
          command:
            - chronos-gateway
            - --config
            - /etc/chronos/gateway.yaml
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # status.listen binds 127.0.0.1, so kubelet httpGet cannot reach it;
          # the binary's healthcheck subcommand probes the loopback endpoint.
          livenessProbe:
            exec:
              command:
                - chronos-gateway
                - healthcheck
                - --config
                - /etc/chronos/gateway.yaml
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - chronos-gateway
                - healthcheck
                - --config
                - /etc/chronos/gateway.yaml
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: config
              mountPath: /etc/chronos
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: chronos-gateway-config
        - name: tmp
          emptyDir: {}
