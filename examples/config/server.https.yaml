server:
  listen: "0.0.0.0:8443"

tls:
  enabled: true
  cert_file: "/etc/chronos/server.crt"
  key_file: "/etc/chronos/server.key"

api:
  cache_control: "no-store"
  # Mount the API under a path prefix to share one reverse proxy with other
  # services, e.g. "/chronos" serves /chronos/time, /chronos/healthz, ...
  # Empty (the default) serves at the root.
  base_path: ""

time_status:
  provider: "chrony"
  chronyc_path: "/usr/bin/chronyc"
  allow_unknown_status: false

logging:
  level: "info"
  format: "json"
