# Chronos gateway chrony configuration.
#
# Install as /etc/chrony/chrony.conf (or an include) on the gateway host. The
# SOCK refclock is fed by chronos-gateway; chronyd disciplines the local clock
# and serves NTP to the internal DC network.

# Reference clock backed by chronos-gateway. The socket path and refid must
# match the gateway's `chrony.sock_path` and `chrony.refid` settings.
#   poll 4   -> poll interval 2^4 = 16 s
#   filter 8 -> median-filter the last 8 samples
refclock SOCK /run/chronos/chrony.sock refid CHRO poll 4 filter 8

# Serve NTP to the internal DC network. Adjust the subnet to your environment.
allow 192.168.100.0/24

# Optional isolated-mode fallback. Disabled by default so the gateway never
# serves time it cannot justify; enable only if you accept free-running drift
# during a prolonged backend outage.
# local stratum 10

# Record the rate at which the system clock gains/loses time.
driftfile /var/lib/chrony/chrony.drift

# Step the clock once on startup if the initial error is large, then only slew.
makestep 1.0 3
