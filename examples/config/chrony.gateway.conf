# Chronos gateway chrony drop-in.
#
# Tip: instead of editing this by hand, generate it from your gateway.yaml with
#   packaging/setup-chrony-refclock.sh --config <gateway.yaml> [--install]
# which derives `poll` from sampling.interval_seconds automatically.
#
# Install as a conf.d drop-in (recommended; it only adds directives and does not
# replace the host's chrony.conf):
#   sudo install -D -m 0644 examples/config/chrony.gateway.conf \
#       /etc/chrony/conf.d/chronos.conf
#   sudo systemctl restart chrony
#
# The SOCK refclock is fed by chronos-gateway; chronyd disciplines the local
# clock (and can serve NTP to the internal network).

# Reference clock backed by chronos-gateway. The socket path and refid must
# match the gateway's `chrony.sock_path` and `chrony.refid` settings.
#   poll 4   -> poll interval 2^4 = 16 s. Size poll so chronyd gets at least two
#               samples per poll: 2^poll >= 2 * gateway sampling.interval_seconds.
#               This pairs with interval_seconds: 8. If poll is too small (a 30 s
#               interval with poll 4) or only barely larger than the interval
#               (30 s with poll 5 = 32 s), jitter leaves many polls empty, so the
#               source stays unselected and a large initial offset is not stepped.
#               For a relaxed interval_seconds: 30, use poll 6 (64 s).
#   filter 8 -> median-filter the last 8 samples
refclock SOCK /run/chrony/chronos.sock refid CHRO poll 4 filter 8

# Serve NTP to the internal network. Uncomment and adjust the subnet for a
# gateway that serves other hosts; leave commented for a host that only syncs
# itself.
# allow 192.168.100.0/24

# A large initial offset (tens of seconds) must be stepped, not slewed forever.
# The Debian/Ubuntu default chrony.conf already sets `makestep 1 3`; if yours
# does not (minimal/standalone config), add it there (not here, to avoid a
# duplicate directive):
#   makestep 1.0 3

# Optional isolated-mode fallback. Disabled by default so the gateway never
# serves time it cannot justify; enable only if you accept free-running drift
# during a prolonged backend outage.
# local stratum 10
