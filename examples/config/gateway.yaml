backends:
  - name: "primary"
    # Base URL of the Chronos server; the gateway appends "/time". Include the
    # server's api.base_path here when set, e.g.
    # "https://time.example.com/chronos".
    base_url: "https://time.example.com"
    require_tls: true
    require_valid_cert: true

sampling:
  # Size this against the daemon's refclock poll so it gets at least two samples
  # per poll. For ntpd/ntpsec SHM the default minpoll is 16 s, so an 8 s interval
  # gives two samples per poll. For chrony see chrony.gateway.conf.
  interval_seconds: 8
  burst_samples: 5
  min_good_samples: 3
  max_rtt_ms: 300
  outlier_threshold_ms: 100

# Output backend selector. Exactly one backend is chosen by `type`.
#
# Default: ntpd/ntpsec SHM refclock. The gateway creates the SHM segment with
# `perm` (0666 lets it run as a NON-root user that ntpd/ntpsec also reads).
# Configure the daemon with the matching SHM unit, e.g.:
#   ntpsec: refclock shm unit 2 refid SHM
#   ntpd:   server 127.127.28.2  (and fudge as needed)
output:
  type: ntp_shm
  unit: 2
  perm: "0666"
  precision: -1

# Alternative: chrony SOCK refclock. chronyd creates the socket as root, so the
# gateway must run as root to write it (see deployment-gateway.md). To use it,
# remove the `output:` block above and uncomment this one (the path and refid
# must match chrony.gateway.conf):
# output:
#   type: chrony_sock
#   sock_path: "/run/chrony/chronos.sock"
#   refid: "CHRO"

security:
  allow_plain_http_backends: false
  allow_plain_http_loopback: true
  pinned_spki: []

status:
  listen: "127.0.0.1:9090"

logging:
  level: "info"
  format: "json"
