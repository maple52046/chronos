server:
  listen: "127.0.0.1:8080"

tls:
  enabled: false
  cert_file: null
  key_file: null

api:
  cache_control: "no-store"
  # Mount the API under a path prefix to share one reverse proxy with other
  # services, e.g. "/chronos" serves /chronos/time, /chronos/healthz, ...
  # Empty (the default) serves at the root.
  base_path: ""

time_status:
  # "system" (default) reads the kernel NTP state via adjtimex and works with
  # any disciplining daemon (chrony, ntpd, systemd-timesyncd). "chrony" queries
  # chronyd directly over its command protocol (no chronyc binary needed).
  provider: "system"
  # Address of chronyd's command socket; only used by the "chrony" provider.
  chrony_address: "127.0.0.1:323"
  allow_unknown_status: false

logging:
  level: "info"
  format: "json"
