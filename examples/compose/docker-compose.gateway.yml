services:
  chronos-gateway:
    image: ghcr.io/maple52046/chronos:1.0.0-20260620153221
    container_name: chronos-gateway
    restart: unless-stopped
    command: ["chronos-gateway", "--config", "/etc/chronos/gateway.yaml"]
    network_mode: host
    # Share the host SysV IPC namespace so the gateway and the host's
    # ntpd/ntpsec see the same SHM refclock segment (127.127.28.<unit>).
    ipc: host
    # Non-root by default: the ntp_shm backend writes a world-writable SHM
    # segment (gateway.yaml output.perm: "0666"), so no root is required.
    user: "65532:65532"
    volumes:
      - ./gateway.yaml:/etc/chronos/gateway.yaml:ro
    read_only: true
    tmpfs:
      - /tmp
    # The image ships no curl; the binary's healthcheck subcommand probes the
    # local status endpoint (status.listen) /healthz.
    healthcheck:
      test: ["CMD", "chronos-gateway", "healthcheck", "--config", "/etc/chronos/gateway.yaml"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

# Notes:
#   1. ntpd/ntpsec must run on the host with a matching SHM refclock unit
#      (gateway.yaml output.unit), e.g. ntpsec: "refclock shm unit 2 refid SHM".
#   2. The gateway creates/attaches the SHM segment; ipc: host makes it visible
#      to the host daemon. The container needs no root and no CAP_SYS_TIME.
#   3. For the chrony_sock backend (root-required) use
#      docker-compose.gateway.chrony.yml instead.
