services:
  chronos-gateway:
    image: ghcr.io/maple52046/chronos:1.0.0-20260620153221
    container_name: chronos-gateway
    restart: unless-stopped
    command: ["chronos-gateway", "--config", "/etc/chronos/gateway.yaml"]
    network_mode: host
    # Opt-in root variant for the chrony_sock backend: chronyd creates the SOCK
    # refclock socket owned by root, so the gateway must be root to write it.
    user: "0:0"
    volumes:
      # Use a gateway.yaml whose output is `type: chrony_sock`
      # (see examples/config/gateway.chrony.yaml).
      - ./gateway.yaml:/etc/chronos/gateway.yaml:ro
      # chrony's own runtime dir, where chronyd creates /run/chrony/chronos.sock.
      - /run/chrony:/run/chrony
    read_only: true
    tmpfs:
      - /tmp
    # The image ships no curl; the binary's healthcheck subcommand probes the
    # local status endpoint (status.listen) /healthz.
    healthcheck:
      test: ["CMD", "chronos-gateway", "healthcheck", "--config", "/etc/chronos/gateway.yaml"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

# Notes:
#   1. chronyd must run on the host, configured with the SOCK refclock from
#      examples/config/chrony.gateway.conf (refid/socket path must match
#      gateway.yaml). Restart chronyd before starting this container so the
#      socket exists.
#   2. chronos-gateway writes to the host chrony socket at /run/chrony.
#   3. the container does not need CAP_SYS_TIME and never sets the clock itself;
#      chronyd is the sole clock disciplinarian.
