services:
  chronos-server:
    image: ghcr.io/maple52046/chronos:v1-20260619143005
    container_name: chronos-server
    restart: unless-stopped
    command: ["chronos-server", "--config", "/etc/chronos/server.yaml"]
    volumes:
      - ./server.yaml:/etc/chronos/server.yaml:ro
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
