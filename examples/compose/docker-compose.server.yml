services:
  chronos-server:
    image: ghcr.io/maple52046/chronos:1.0.0-20260620153221
    container_name: chronos-server
    restart: unless-stopped
    command: ["chronos-server", "--config", "/etc/chronos/server.yaml"]
    volumes:
      - ./server.yaml:/etc/chronos/server.yaml:ro
    # Default networking fits time_status.provider: "system" (reads the kernel
    # clock; needs no host access). Publish the server.listen port:
    ports:
      - "127.0.0.1:8080:8080"
    # For time_status.provider: "chrony", the server queries the host chronyd at
    # 127.0.0.1:323, which only works with host networking. In that case REMOVE
    # the `ports` block above and use host networking instead:
    #   network_mode: host
    # (server.listen is then reached directly on the host, e.g. 127.0.0.1:8080).
    # The image ships no curl; the binary's healthcheck subcommand probes the
    # local /healthz, honoring server.listen and api.base_path from the config.
    healthcheck:
      test: ["CMD", "chronos-server", "healthcheck", "--config", "/etc/chronos/server.yaml"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
