server {
    listen 443 ssl http2;
    server_name time.example.com;

    ssl_certificate     /etc/letsencrypt/live/time.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/time.example.com/privkey.pem;

    # Only the three Time API endpoints are exposed; everything else 404s.
    location = /time {
        proxy_pass http://127.0.0.1:8080/time;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        add_header Cache-Control "no-store" always;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:8080/healthz;
        proxy_cache off;
        add_header Cache-Control "no-store" always;
    }

    location = /status {
        proxy_pass http://127.0.0.1:8080/status;
        proxy_cache off;
        add_header Cache-Control "no-store" always;
    }
}
