<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Chronos high-level system architecture</title>
  <desc id="desc">A synced server-side host exposes the Chronos Time API over HTTP or HTTPS. A restricted data center makes outbound HTTP or HTTPS requests from chronos-gateway, feeds a local NTP daemon through a refclock interface, and serves NTP to internal clients.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .canvas { fill: #f8fafc; }
      .zone { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 24; }
      .zone-blue { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 2; rx: 24; }
      .zone-green { fill: #f0fdf4; stroke: #bbf7d0; stroke-width: 2; rx: 24; }
      .zone-title { fill: #334155; font: 800 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .box { filter: url(#shadow); }
      .server { fill: #dbeafe; stroke: #2563eb; stroke-width: 2.5; rx: 18; }
      .gateway { fill: #dcfce7; stroke: #16a34a; stroke-width: 2.5; rx: 18; }
      .daemon { fill: #f1f5f9; stroke: #475569; stroke-width: 2.5; rx: 18; }
      .clients { fill: #fef3c7; stroke: #d97706; stroke-width: 2.5; rx: 18; }
      .source { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.5; rx: 18; }
      .note { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; rx: 16; }
      .title { fill: #0f172a; font: 800 28px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #475569; font: 500 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 700 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { fill: #334155; font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #475569; font: 500 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow-label { fill: #1e3a8a; font: 700 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .green-label { fill: #14532d; font: 700 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .slate-label { fill: #334155; font: 700 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .red-label { fill: #991b1b; font: 700 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow-blue { stroke: #2563eb; stroke-width: 3.5; fill: none; marker-start: url(#arrow-blue); marker-end: url(#arrow-blue); }
      .arrow-green { stroke: #15803d; stroke-width: 3.5; fill: none; marker-end: url(#arrow-green); }
      .arrow-slate { stroke: #475569; stroke-width: 3.5; fill: none; marker-end: url(#arrow-slate); }
      .firewall { stroke: #94a3b8; stroke-width: 3; stroke-dasharray: 10 10; }
      .divider { stroke: #cbd5e1; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="canvas" width="1200" height="640"/>
  <text x="60" y="56" class="title">Chronos High-Level System Architecture</text>
  <text x="60" y="84" class="subtitle">A restricted data center keeps accurate time using outbound HTTP/HTTPS instead of outbound NTP.</text>

  <rect x="50" y="125" width="315" height="385" class="zone-blue"/>
  <text x="80" y="160" class="zone-title">Reference / Time API side</text>

  <g class="box">
    <rect x="90" y="205" width="235" height="95" class="source"/>
    <text x="120" y="240" class="label">Synced host clock</text>
    <text x="120" y="265" class="small">Existing NTP, PTP, or cloud time</text>
  </g>

  <g class="box">
    <rect x="90" y="355" width="235" height="105" class="server"/>
    <text x="120" y="390" class="label">chronos-server</text>
    <line x1="120" y1="406" x2="295" y2="406" class="divider"/>
    <text x="120" y="431" class="body">HTTP Time API</text>
    <text x="120" y="453" class="small">/time, /healthz, /status</text>
  </g>

  <line x1="430" y1="120" x2="430" y2="530" class="firewall"/>
  <text x="392" y="558" class="slate-label">Network boundary</text>
  <text x="360" y="580" class="small">restricted DC allows outbound HTTPS</text>

  <rect x="495" y="125" width="655" height="385" class="zone-green"/>
  <text x="525" y="160" class="zone-title">Restricted data center</text>

  <g class="box">
    <rect x="535" y="230" width="235" height="125" class="gateway"/>
    <text x="565" y="265" class="label">chronos-gateway</text>
    <line x1="565" y1="281" x2="740" y2="281" class="divider"/>
    <text x="565" y="306" class="body">Samples Time API</text>
    <text x="565" y="328" class="body">Filters and estimates offset</text>
    <text x="565" y="350" class="small">Local status endpoint</text>
  </g>

  <g class="box">
    <rect x="865" y="230" width="235" height="125" class="daemon"/>
    <text x="895" y="265" class="label">Local NTP daemon</text>
    <line x1="895" y1="281" x2="1070" y2="281" class="divider"/>
    <text x="895" y="306" class="body">chronyd / ntpd / ntpsec</text>
    <text x="895" y="328" class="body">Disciplines host clock</text>
    <text x="895" y="350" class="small">Serves internal NTP</text>
  </g>

  <g class="box">
    <rect x="715" y="410" width="235" height="80" class="clients"/>
    <text x="745" y="444" class="label">Internal clients</text>
    <text x="745" y="468" class="small">Servers, VMs, workloads</text>
  </g>

  <path d="M 208 300 L 208 355" class="arrow-slate"/>
  <text x="225" y="333" class="slate-label">host time</text>

  <path d="M 325 408 C 470 408, 470 292, 535 292" class="arrow-blue"/>
  <text x="388" y="337" class="arrow-label">Outbound HTTP/HTTPS</text>
  <text x="392" y="360" class="small">Time API request/response</text>

  <path d="M 770 292 L 865 292" class="arrow-green"/>
  <text x="785" y="276" class="green-label">SOCK or SHM refclock</text>

  <path d="M 982 355 C 982 395, 950 416, 950 450" class="arrow-slate"/>
  <text x="990" y="407" class="slate-label">NTP UDP/123</text>

  <rect x="500" y="535" width="250" height="44" class="note"/>
  <text x="532" y="563" class="red-label">Outbound NTP is not required</text>

  <text x="60" y="600" class="subtitle">Chronos moves time samples over web-friendly HTTP/HTTPS, then hands them to the local NTP stack that already serves the internal network.</text>
</svg>
